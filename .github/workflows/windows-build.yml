name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-exe:
    name: Build EXE (windows-x64)
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Download vcpkg installed
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: windows-deps.yml
        name: vcpkg-installed-x64-windows
        path: vcpkg/
      continue-on-error: true
      id: download-deps

    - name: Check if dependencies exist
      id: check-deps
      shell: pwsh
      run: |
        if (Test-Path "vcpkg/installed/x64-windows/share/gdal/GDALConfig.cmake") {
          Write-Host "Dependencies found from artifact!"
          echo "deps_found=true" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "Dependencies NOT found. Need to build them."
          Write-Host "Please run the 'Windows Dependencies' workflow first!"
          echo "deps_found=false" >> $env:GITHUB_OUTPUT
        }

    - name: Fail if no dependencies
      if: steps.check-deps.outputs.deps_found == 'false'
      shell: pwsh
      run: |
        Write-Host "ERROR: Dependencies not found!"
        Write-Host ""
        Write-Host "Please run the 'Windows Dependencies' workflow first:"
        Write-Host "  1. Go to Actions tab"
        Write-Host "  2. Click 'Windows Dependencies'"
        Write-Host "  3. Click 'Run workflow'"
        Write-Host "  4. Wait for it to complete"
        Write-Host "  5. Re-run this workflow"
        exit 1

    - name: Install CMake and Ninja
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: 3.31.6

    - name: Developer Command Prompt for Microsoft Visual C++
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 500M
        key: build-ccache-win64-${{ github.event.pull_request.base.ref || github.ref_name }}
        save: ${{ github.event_name == 'push' }}

    - name: Configure CMake
      shell: bash
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET="x64-windows" \
          -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreaded" \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build --config Release --verbose

    - name: Check dependencies
      shell: pwsh
      run: |
        Write-Host "=== Checking DLL dependencies ==="
        dumpbin /DEPENDENTS build\convert_fgd_dem_cpp.exe
        Write-Host ""
        Write-Host "=== File size ==="
        Get-Item build\convert_fgd_dem_cpp.exe | Format-List Length

    - name: Prepare artifacts
      shell: pwsh
      run: |
        Write-Host "=== Preparing artifacts ==="
        New-Item -ItemType Directory -Force -Path artifacts
        Copy-Item build\convert_fgd_dem_cpp.exe artifacts\

        # Copy all required DLLs
        Write-Host "=== Copying DLLs ==="
        Copy-Item vcpkg\installed\x64-windows\bin\*.dll artifacts\
        Write-Host "Copied DLLs:"
        Get-ChildItem artifacts\*.dll | Format-Table Name, Length

        # Copy documentation
        if (Test-Path README_WINDOWS.md) { Copy-Item README_WINDOWS.md artifacts\ }
        if (Test-Path README.md) { Copy-Item README.md artifacts\ }
        if (Test-Path LICENSE) { Copy-Item LICENSE artifacts\ }

        Write-Host ""
        Write-Host "=== Final artifacts summary ==="
        Write-Host "EXE files:"
        Get-ChildItem artifacts\*.exe | Format-Table Name, Length
        Write-Host "DLL files: $(( Get-ChildItem artifacts\*.dll ).Count) files"
        Write-Host "Total size: $([math]::Round((Get-ChildItem artifacts -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)) MB"

    - name: Test executable
      shell: cmd
      run: |
        echo === Testing executable ===
        artifacts\convert_fgd_dem_cpp.exe --help || echo Help command executed
        if %ERRORLEVEL% EQU 0 (
          echo Executable runs successfully!
        ) else (
          echo ERROR: Executable failed!
          exit /b 1
        )

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: convert-fgd-dem-cpp-windows-x64
        path: artifacts/
        retention-days: 30

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        Compress-Archive -Path artifacts\* -DestinationPath convert-fgd-dem-cpp-windows-x64.zip

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: convert-fgd-dem-cpp-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
