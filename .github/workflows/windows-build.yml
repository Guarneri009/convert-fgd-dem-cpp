name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-msys2:
    name: build (windows-x64-msys2)
    runs-on: windows-2022

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-gdal
          mingw-w64-ucrt-x86_64-libzip
          mingw-w64-ucrt-x86_64-tbb

    - name: Verify installation
      run: |
        echo "=== GCC version ==="
        gcc --version
        echo ""
        echo "=== CMake version ==="
        cmake --version
        echo ""
        echo "=== GDAL version ==="
        gdal-config --version
        echo ""
        echo "=== pkg-config check ==="
        pkg-config --modversion gdal
        pkg-config --modversion libzip

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cmake --build build --config Release

    - name: Check executable
      run: |
        echo "=== File info ==="
        ls -la build/convert_fgd_dem_cpp.exe
        echo ""
        echo "=== Linked libraries ==="
        ldd build/convert_fgd_dem_cpp.exe

    - name: Test executable
      run: |
        echo "=== Testing executable ==="
        ./build/convert_fgd_dem_cpp.exe --help || true
        echo "Executable runs successfully!"

    - name: Prepare artifacts
      shell: pwsh
      run: |
        Write-Host "=== Preparing artifacts ==="
        New-Item -ItemType Directory -Force -Path artifacts
        Copy-Item build\convert_fgd_dem_cpp.exe artifacts\

        # Copy required DLLs from MSYS2
        $msys2Bin = "D:\a\_temp\msys64\ucrt64\bin"

        # Get required DLLs using ldd output
        Write-Host "=== Copying required DLLs ==="

        # Core runtime DLLs
        $dlls = @(
          "libgcc_s_seh-1.dll",
          "libstdc++-6.dll",
          "libwinpthread-1.dll",
          "libgdal-36.dll",
          "libzip.dll",
          "libtbb12.dll",
          "zlib1.dll",
          "libbz2-1.dll",
          "liblzma-5.dll",
          "libzstd.dll",
          "libexpat-1.dll",
          "libsqlite3-0.dll",
          "libproj-25.dll",
          "libcurl-4.dll",
          "libjpeg-8.dll",
          "libpng16-16.dll",
          "libtiff-6.dll",
          "libgeotiff-5.dll",
          "libwebp-7.dll",
          "libgeos_c.dll",
          "libgeos.dll",
          "libopenjp2-7.dll",
          "libfreexl-1.dll",
          "libxml2-2.dll",
          "libpq.dll",
          "libhdf5-310.dll",
          "libnetcdf-19.dll",
          "libspatialite-8.dll",
          "libiconv-2.dll",
          "libintl-8.dll",
          "libcrypto-3-x64.dll",
          "libssl-3-x64.dll",
          "libbrotlidec.dll",
          "libbrotlicommon.dll",
          "libnghttp2-14.dll",
          "libidn2-0.dll",
          "libssh2-1.dll",
          "libpsl-5.dll",
          "libunistring-5.dll",
          "libdeflate.dll",
          "libjbig-0.dll",
          "libLerc.dll",
          "libsharpyuv-0.dll",
          "libhdf5_hl-310.dll",
          "libsz-2.dll",
          "libaec-0.dll",
          "libminizip-1.dll",
          "libpcre2-8-0.dll"
        )

        foreach ($dll in $dlls) {
          $src = Join-Path $msys2Bin $dll
          if (Test-Path $src) {
            Copy-Item $src artifacts\
            Write-Host "Copied: $dll"
          }
        }

        # Copy GDAL data files
        $gdalData = "D:\a\_temp\msys64\ucrt64\share\gdal"
        if (Test-Path $gdalData) {
          Copy-Item -Recurse $gdalData artifacts\gdal-data
          Write-Host "Copied GDAL data files"
        }

        # Copy PROJ data files
        $projData = "D:\a\_temp\msys64\ucrt64\share\proj"
        if (Test-Path $projData) {
          Copy-Item -Recurse $projData artifacts\proj-data
          Write-Host "Copied PROJ data files"
        }

        # Copy documentation
        if (Test-Path README_WINDOWS.md) { Copy-Item README_WINDOWS.md artifacts\ }
        if (Test-Path README.md) { Copy-Item README.md artifacts\ }
        if (Test-Path LICENSE) { Copy-Item LICENSE artifacts\ }

        Write-Host ""
        Write-Host "=== Final artifacts summary ==="
        Write-Host "EXE files:"
        Get-ChildItem artifacts\*.exe | Format-Table Name, Length
        Write-Host "DLL files: $(( Get-ChildItem artifacts\*.dll -ErrorAction SilentlyContinue ).Count) files"
        Write-Host "Total size: $([math]::Round((Get-ChildItem artifacts -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)) MB"

    - name: Test artifact executable
      shell: pwsh
      run: |
        Write-Host "=== Testing artifact executable ==="
        $env:GDAL_DATA = "$PWD\artifacts\gdal-data"
        $env:PROJ_DATA = "$PWD\artifacts\proj-data"
        & .\artifacts\convert_fgd_dem_cpp.exe --help
        if ($LASTEXITCODE -eq 0) {
          Write-Host "Artifact executable runs successfully!"
        } else {
          Write-Host "ERROR: Artifact executable failed!"
          exit 1
        }

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-x64-windows
        path: |
          build/**/*.log

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: convert-fgd-dem-cpp-windows-x64
        path: artifacts/
        retention-days: 30

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        Compress-Archive -Path artifacts\* -DestinationPath convert-fgd-dem-cpp-windows-x64.zip

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: convert-fgd-dem-cpp-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
