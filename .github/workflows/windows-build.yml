name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # OSGeo4W compatible build with MSVC
  build-osgeo4w:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Setup vcpkg cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/vcpkg/installed
          ${{ github.workspace }}/vcpkg/downloads
        key: vcpkg-osgeo4w-${{ runner.os }}-gdal-libzip-tbb-v2
        restore-keys: |
          vcpkg-osgeo4w-${{ runner.os }}-

    - name: Install vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat

    - name: Install dependencies via vcpkg
      run: |
        .\vcpkg\vcpkg install gdal:x64-windows libzip:x64-windows tbb:x64-windows --triplet x64-windows
      timeout-minutes: 120

    - name: Verify vcpkg installation
      run: |
        Write-Host "=== Installed packages ==="
        .\vcpkg\vcpkg list
        Write-Host ""
        Write-Host "=== GDAL installation check ==="
        if (Test-Path ".\vcpkg\installed\x64-windows\share\gdal\GDALConfig.cmake") {
          Write-Host "GDAL found!"
        } else {
          Write-Host "ERROR: GDAL not found!"
          Get-ChildItem -Recurse .\vcpkg\installed\ -Name "*gdal*" -ErrorAction SilentlyContinue
          exit 1
        }

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET="x64-windows" `
          -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreaded"

    - name: Build
      run: cmake --build build --config Release --verbose

    - name: Check dependencies
      shell: pwsh
      run: |
        Write-Host "=== Checking DLL dependencies ==="
        dumpbin /DEPENDENTS build\convert_fgd_dem_cpp.exe
        Write-Host ""
        Write-Host "=== File size ==="
        Get-Item build\convert_fgd_dem_cpp.exe | Format-List Length

    - name: Prepare artifacts
      shell: pwsh
      run: |
        Write-Host "=== Preparing artifacts ==="
        New-Item -ItemType Directory -Force -Path artifacts
        Copy-Item build\convert_fgd_dem_cpp.exe artifacts\

        # Copy TBB DLLs (required for parallel processing)
        Write-Host "=== Copying TBB DLLs ==="
        Copy-Item vcpkg\installed\x64-windows\bin\tbb*.dll artifacts\
        Get-ChildItem artifacts\tbb*.dll | Format-Table Name, Length

        # Copy documentation
        if (Test-Path README_WINDOWS.md) {
          Copy-Item README_WINDOWS.md artifacts\
        }
        if (Test-Path README.md) {
          Copy-Item README.md artifacts\
        }
        if (Test-Path LICENSE) {
          Copy-Item LICENSE artifacts\
        }
        if (Test-Path convert_osgeo4w.bat) {
          Copy-Item convert_osgeo4w.bat artifacts\convert.bat
        }

        Write-Host ""
        Write-Host "=== Final artifacts contents ==="
        Get-ChildItem artifacts | Format-Table Name, Length

    - name: Test executable
      shell: cmd
      run: |
        echo === Testing executable ===
        artifacts\convert_fgd_dem_cpp.exe --help || echo Help command executed
        if %ERRORLEVEL% EQU 0 (
          echo Executable runs successfully!
        ) else (
          echo ERROR: Executable failed!
          exit /b 1
        )

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: convert-fgd-dem-cpp-windows-x64-osgeo4w
        path: artifacts/
        retention-days: 30

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        Compress-Archive -Path artifacts\* -DestinationPath convert-fgd-dem-cpp-windows-x64-osgeo4w.zip

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: convert-fgd-dem-cpp-windows-x64-osgeo4w.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

