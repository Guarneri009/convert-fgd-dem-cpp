name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-osgeo4w:
    name: build (windows-x64)
    runs-on: windows-2022

    steps:
    - name: 🐣 Checkout code
      uses: actions/checkout@v5

    - name: 📦 Export GitHub Actions cache environment variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: 🔨 Uninstall system cmake
      shell: bash
      run: |
        choco uninstall cmake.install -y

    - name: 🐩 Install CMake and Ninja
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: 3.31.6

    - name: 🧽 Developer Command Prompt for Microsoft Visual C++
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: 🎡 Setup vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat

    - name: 🛍️ Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 500M
        key: build-ccache-win64-${{ github.event.pull_request.base.ref || github.ref_name }}
        save: ${{ github.event_name == 'push' }}

    - name: 🛍️ Tune ccache configuration
      shell: bash
      run: |
        ccache --set-config sloppiness=pch_defines,time_macros,include_file_mtime,include_file_ctime

    - name: 🌱 Install dependencies via vcpkg
      shell: bash
      env:
        X_VCPKG_ASSET_SOURCES: x-azurl,https://assetcache.open-vcpkg.org/assetcache,,read
      run: |
        ./vcpkg/vcpkg install gdal:x64-windows libzip:x64-windows tbb:x64-windows --triplet x64-windows
      timeout-minutes: 120

    - name: ✅ Verify vcpkg installation
      run: |
        Write-Host "=== Installed packages ==="
        .\vcpkg\vcpkg list
        Write-Host ""
        Write-Host "=== GDAL installation check ==="
        if (Test-Path ".\vcpkg\installed\x64-windows\share\gdal\GDALConfig.cmake") {
          Write-Host "GDAL found!"
        } else {
          Write-Host "ERROR: GDAL not found!"
          Get-ChildItem -Recurse .\vcpkg\installed\ -Name "*gdal*" -ErrorAction SilentlyContinue
          exit 1
        }

    - name: 🔧 Configure CMake
      shell: bash
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET="x64-windows" \
          -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreaded" \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: 🌋 Build
      run: cmake --build build --config Release --verbose

    - name: 🔍 Check dependencies
      shell: pwsh
      run: |
        Write-Host "=== Checking DLL dependencies ==="
        dumpbin /DEPENDENTS build\convert_fgd_dem_cpp.exe
        Write-Host ""
        Write-Host "=== File size ==="
        Get-Item build\convert_fgd_dem_cpp.exe | Format-List Length

    - name: 📦 Prepare artifacts
      shell: pwsh
      run: |
        Write-Host "=== Preparing artifacts ==="
        New-Item -ItemType Directory -Force -Path artifacts
        Copy-Item build\convert_fgd_dem_cpp.exe artifacts\

        # Copy all required DLLs (GDAL, libzip, TBB, and their dependencies)
        Write-Host "=== Copying DLLs ==="
        Copy-Item vcpkg\installed\x64-windows\bin\*.dll artifacts\
        Write-Host "Copied DLLs:"
        Get-ChildItem artifacts\*.dll | Format-Table Name, Length

        # Copy documentation
        if (Test-Path README_WINDOWS.md) {
          Copy-Item README_WINDOWS.md artifacts\
        }
        if (Test-Path README.md) {
          Copy-Item README.md artifacts\
        }
        if (Test-Path LICENSE) {
          Copy-Item LICENSE artifacts\
        }
        if (Test-Path convert_osgeo4w.bat) {
          Copy-Item convert_osgeo4w.bat artifacts\convert.bat
        }

        Write-Host ""
        Write-Host "=== Final artifacts summary ==="
        Write-Host "EXE files:"
        Get-ChildItem artifacts\*.exe | Format-Table Name, Length
        Write-Host "DLL files: $(( Get-ChildItem artifacts\*.dll ).Count) files"
        Write-Host "Total size: $([math]::Round((Get-ChildItem artifacts -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)) MB"

    - name: 🧪 Test executable
      shell: cmd
      run: |
        echo === Testing executable ===
        artifacts\convert_fgd_dem_cpp.exe --help || echo Help command executed
        if %ERRORLEVEL% EQU 0 (
          echo Executable runs successfully!
        ) else (
          echo ERROR: Executable failed!
          exit /b 1
        )

    - name: 📑 Upload build logs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-x64-windows
        path: |
          build/**/*.log
          vcpkg/buildtrees/**/*.log

    - name: 📤 Upload artifacts
      uses: actions/upload-artifact@v4
      id: artifact-win64
      with:
        name: convert-fgd-dem-cpp-windows-x64
        path: artifacts/
        retention-days: 30

    - name: 📝 Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        Compress-Archive -Path artifacts\* -DestinationPath convert-fgd-dem-cpp-windows-x64.zip

    - name: 🚀 Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: convert-fgd-dem-cpp-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
