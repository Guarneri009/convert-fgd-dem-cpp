name: Windows Build

on:
  push:
    branches: [ main, for_mac ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gdal
          mingw-w64-x86_64-libzip
          mingw-w64-x86_64-tbb
          mingw-w64-x86_64-pkg-config
          make

    - name: Build with CMake
      shell: msys2 {0}
      run: |
        cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Run tests
      shell: msys2 {0}
      run: |
        cd build
        ctest --output-on-failure

    - name: Package artifacts
      shell: msys2 {0}
      run: |
        mkdir -p artifacts
        cp build/convert_fgd_dem_cpp.exe artifacts/

        # Copy required DLLs
        ldd build/convert_fgd_dem_cpp.exe | grep -i mingw | awk '{print $3}' | xargs -I {} cp {} artifacts/ || true

        # Create a simple README
        cat > artifacts/README.txt << 'EOF'
        convert_fgd_dem_cpp - Windows Build
        ====================================

        This is a Windows build of convert_fgd_dem_cpp.

        Usage:
          convert_fgd_dem_cpp.exe [options]

        For more information, run:
          convert_fgd_dem_cpp.exe --help

        Build Information:
          - Built with MinGW-w64 GCC
          - Dependencies: GDAL, libzip, TBB
        EOF

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: convert-fgd-dem-cpp-windows-x64
        path: artifacts/
        retention-days: 30

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: msys2 {0}
      run: |
        cd artifacts
        zip -r ../convert-fgd-dem-cpp-windows-x64.zip .

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: convert-fgd-dem-cpp-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
