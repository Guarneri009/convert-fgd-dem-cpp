name: Windows Build (MSVC)

on:
  push:
    branches: [ main-a]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup vcpkg binary caching
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        ./bootstrap-vcpkg.bat
        echo "$PWD" >> $env:GITHUB_PATH

    - name: Install dependencies with vcpkg (dynamic)
      run: |
        cd vcpkg
        # Install packages with dynamic x64-windows triplet
        ./vcpkg install gdal:x64-windows
        ./vcpkg install libzip:x64-windows
        ./vcpkg install tbb:x64-windows
        ./vcpkg integrate install

    - name: Configure CMake with vcpkg toolchain
      run: |
        cmake -B build `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows

    - name: Build
      run: cmake --build build --config Release

    - name: Run tests
      run: |
        cd build
        ctest -C Release --output-on-failure

    - name: Package artifacts with organized folder structure
      shell: powershell
      run: |
        # Create directory structure
        New-Item -ItemType Directory -Force -Path artifacts
        New-Item -ItemType Directory -Force -Path artifacts/bin
        New-Item -ItemType Directory -Force -Path artifacts/data/gdal-data
        New-Item -ItemType Directory -Force -Path artifacts/data/proj-data

        # Copy executable
        Copy-Item "build/Release/convert_fgd_dem_cpp.exe" "artifacts/"

        # Collect DLL dependencies
        Write-Host "Collecting DLL dependencies..."

        $exePath = "build/Release/convert_fgd_dem_cpp.exe"
        $vcpkgInstalled = "vcpkg/installed/x64-windows"

        # Get list of DLLs using dumpbin
        $dllList = @()

        # Function to get dependencies recursively
        function Get-Dependencies {
            param($filePath, $processedDlls)

            $output = & dumpbin /dependents "$filePath" 2>&1 | Out-String
            $matches = [regex]::Matches($output, '(\w+\.dll)')

            foreach ($match in $matches) {
                $dllName = $match.Groups[1].Value.ToLower()

                # Skip system DLLs
                if ($dllName -match '^(kernel32|user32|advapi32|ws2_32|msvcrt|vcruntime|ucrtbase|msvcp)') {
                    continue
                }

                # Skip if already processed
                if ($processedDlls.Contains($dllName)) {
                    continue
                }

                $processedDlls.Add($dllName) | Out-Null

                # Find DLL in vcpkg
                $dllPath = Get-ChildItem -Path "$vcpkgInstalled/bin" -Filter $dllName -ErrorAction SilentlyContinue | Select-Object -First 1

                if ($dllPath) {
                    Write-Host "  Copying: $dllName"
                    Copy-Item $dllPath.FullName "artifacts/bin/"

                    # Recursively process this DLL
                    Get-Dependencies -filePath $dllPath.FullName -processedDlls $processedDlls
                }
            }
        }

        $processed = New-Object System.Collections.Generic.HashSet[string]
        Get-Dependencies -filePath $exePath -processedDlls $processed

        Write-Host "DLL collection complete!"
        Write-Host "Total DLLs copied: $($processed.Count)"

        # Copy GDAL data files
        $gdalDataPath = "$vcpkgInstalled/share/gdal"
        if (Test-Path $gdalDataPath) {
            Write-Host "Copying GDAL data files..."
            Copy-Item -Recurse "$gdalDataPath/*" "artifacts/data/gdal-data/"
        }

        # Copy PROJ data files
        $projDataPath = "$vcpkgInstalled/share/proj"
        if (Test-Path $projDataPath) {
            Write-Host "Copying PROJ data files..."
            Copy-Item -Recurse "$projDataPath/*" "artifacts/data/proj-data/"
        }

        # Create launcher script
        @'
        @echo off
        setlocal

        REM Add bin directory to PATH for DLL loading
        set PATH=%~dp0bin;%PATH%

        REM Set GDAL and PROJ data paths
        set GDAL_DATA=%~dp0data\gdal-data
        set PROJ_LIB=%~dp0data\proj-data

        REM Run the executable with all arguments
        "%~dp0convert_fgd_dem_cpp.exe" %*

        endlocal
        '@ | Out-File -FilePath "artifacts/convert_fgd_dem_cpp.bat" -Encoding ASCII

        # Create README
        @'
        convert_fgd_dem_cpp - Windows Build (MSVC)
        ==========================================

        This is a portable build of convert_fgd_dem_cpp for Windows.
        Built with Microsoft Visual C++ (MSVC) for optimal Windows compatibility.
        All required DLLs and data files are included in organized folders.

        NO INSTALLATION REQUIRED - Just extract and run!

        Usage:
        ------
        1. Extract this ZIP file to any folder
        2. Run convert_fgd_dem_cpp.bat (recommended) or convert_fgd_dem_cpp.exe

        Using the launcher (recommended):
          convert_fgd_dem_cpp.bat [options] <input> <output>

        Using the executable directly:
          set PATH=%CD%\bin;%PATH%
          set GDAL_DATA=%CD%\data\gdal-data
          set PROJ_LIB=%CD%\data\proj-data
          convert_fgd_dem_cpp.exe [options] <input> <output>

        For help:
          convert_fgd_dem_cpp.bat --help

        Folder Structure:
        -----------------
        convert_fgd_dem_cpp/
        ├── convert_fgd_dem_cpp.exe  - Main executable
        ├── convert_fgd_dem_cpp.bat  - Launcher script (recommended)
        ├── README.txt               - This file
        ├── bin/                     - Required DLLs (10-20 files, organized)
        │   └── *.dll
        └── data/                    - Data files (organized)
            ├── gdal-data/           - GDAL coordinate system data
            └── proj-data/           - PROJ transformation data

        Build Information:
        ------------------
        - Compiler: Microsoft Visual C++ (MSVC) 2022
        - C++20 Standard
        - Optimized Release Build (/O2)
        - Dependencies: GDAL, libzip, TBB, PROJ
        - Runtime: Windows native (minimal DLL dependencies)

        Advantages of MSVC Build:
        --------------------------
        - Native Windows compilation (better performance)
        - Fewer DLLs compared to MinGW build (10-20 vs 50-100)
        - Better Windows integration
        - Uses Windows system runtime libraries

        Note: This is a portable build. You can copy this entire folder
              to any Windows PC (Windows 10/11) and it will work without installation.
        '@ | Out-File -FilePath "artifacts/README.txt" -Encoding UTF8

        # Display package info
        Write-Host ""
        Write-Host "=== Package Contents ==="
        Write-Host "Executable:"
        Get-Item "artifacts/convert_fgd_dem_cpp.exe" | Format-Table Name, @{Name="Size (MB)"; Expression={[math]::Round($_.Length/1MB, 2)}}
        Write-Host ""
        Write-Host "DLL count: $((Get-ChildItem 'artifacts/bin/*.dll').Count)"
        Write-Host ""
        Write-Host "DLL list:"
        Get-ChildItem "artifacts/bin/*.dll" | Format-Table Name

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: convert-fgd-dem-cpp-windows-x64-msvc
        path: artifacts/
        retention-days: 30

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: powershell
      run: |
        Compress-Archive -Path artifacts/* -DestinationPath convert-fgd-dem-cpp-windows-x64-msvc.zip

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: convert-fgd-dem-cpp-windows-x64-msvc.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
