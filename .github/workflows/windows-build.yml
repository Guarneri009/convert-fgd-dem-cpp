name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-msys2:
    name: build (windows-x64-msys2)
    runs-on: windows-2022

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-gdal
          mingw-w64-ucrt-x86_64-libzip
          mingw-w64-ucrt-x86_64-tbb

    - name: Verify installation
      run: |
        echo "=== GCC version ==="
        gcc --version
        echo ""
        echo "=== CMake version ==="
        cmake --version
        echo ""
        echo "=== GDAL version ==="
        gdal-config --version
        echo ""
        echo "=== pkg-config check ==="
        pkg-config --modversion gdal
        pkg-config --modversion libzip

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cmake --build build --config Release

    - name: Check executable
      run: |
        echo "=== File info ==="
        ls -la build/convert_fgd_dem_cpp.exe
        echo ""
        echo "=== Linked libraries ==="
        ldd build/convert_fgd_dem_cpp.exe

    - name: Test executable
      run: |
        echo "=== Testing executable ==="
        ./build/convert_fgd_dem_cpp.exe --help || true
        echo "Executable runs successfully!"

    - name: Collect required DLLs
      run: |
        echo "=== Collecting required DLLs using ldd ==="
        mkdir -p artifacts
        cp build/convert_fgd_dem_cpp.exe artifacts/

        # Use ldd to find all required DLLs and copy them
        ldd build/convert_fgd_dem_cpp.exe | grep -i ucrt64 | awk '{print $3}' | while read dll; do
          if [ -f "$dll" ]; then
            cp "$dll" artifacts/
            echo "Copied: $(basename $dll)"
          fi
        done

        echo ""
        echo "=== Copied DLLs ==="
        ls -la artifacts/*.dll | wc -l
        echo "DLLs copied"

    - name: Prepare artifacts
      shell: pwsh
      run: |
        Write-Host "=== Preparing artifacts ==="

        $msys2Base = "D:\a\_temp\msys64\ucrt64"

        # Copy GDAL data files
        $gdalData = "$msys2Base\share\gdal"
        if (Test-Path $gdalData) {
          Copy-Item -Recurse $gdalData artifacts\gdal-data
          Write-Host "Copied GDAL data files"
        }

        # Copy PROJ data files
        $projData = "$msys2Base\share\proj"
        if (Test-Path $projData) {
          Copy-Item -Recurse $projData artifacts\proj-data
          Write-Host "Copied PROJ data files"
        }

        # Copy documentation
        if (Test-Path README_WINDOWS.md) { Copy-Item README_WINDOWS.md artifacts\ }
        if (Test-Path README.md) { Copy-Item README.md artifacts\ }
        if (Test-Path LICENSE) { Copy-Item LICENSE artifacts\ }

        Write-Host ""
        Write-Host "=== Final artifacts summary ==="
        Write-Host "EXE files:"
        Get-ChildItem artifacts\*.exe | Format-Table Name, Length
        Write-Host "DLL files: $(( Get-ChildItem artifacts\*.dll -ErrorAction SilentlyContinue ).Count) files"
        Write-Host "Total size: $([math]::Round((Get-ChildItem artifacts -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)) MB"

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-x64-windows
        path: |
          build/**/*.log

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: convert-fgd-dem-cpp-windows-x64
        path: artifacts/
        retention-days: 30

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        Compress-Archive -Path artifacts\* -DestinationPath convert-fgd-dem-cpp-windows-x64.zip

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: convert-fgd-dem-cpp-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
