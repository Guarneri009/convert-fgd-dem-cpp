name: Windows Build

on:
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # MSYS2/MinGW build with complete static linking
  build-msys2-static:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gdal
          mingw-w64-x86_64-libzip
          mingw-w64-x86_64-tbb

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build

    - name: Verify static linking
      run: |
        echo "=== Checking dependencies ==="
        ldd build/convert_fgd_dem_cpp.exe
        echo ""
        echo "=== File size ==="
        ls -lh build/convert_fgd_dem_cpp.exe

    - name: Package artifacts
      shell: bash
      run: |
        mkdir -p artifacts
        cp build/convert_fgd_dem_cpp.exe artifacts/

        # Create README
        cat > artifacts/README.txt << 'EOF'
convert_fgd_dem_cpp - Windows Static Build (MSYS2/MinGW)
=========================================================

This is a STANDALONE static build of convert_fgd_dem_cpp for Windows.
Built with MSYS2/MinGW with complete static linking.

NO INSTALLATION REQUIRED - NO DLLs NEEDED!

This executable includes all dependencies statically linked and can run
on any Windows 10/11 system without any additional files or installations.

Usage:
------
  convert_fgd_dem_cpp.exe [options] <input> <output>

For help:
  convert_fgd_dem_cpp.exe --help

Build Information:
------------------
- Compiler: GCC (MSYS2/MinGW) with complete static linking
- C++20 Standard
- Optimized Release Build (-O3 -march=native)
- All dependencies statically linked (GDAL, libzip, TBB, PROJ, etc.)
- No external DLLs required (except Windows system DLLs)

Advantages:
-----------
- Complete standalone executable
- No DLL dependencies
- Maximum portability
- Single file distribution

File size: Larger than dynamic build (~50-100MB) but completely self-contained.
EOF

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: convert-fgd-dem-cpp-windows-x64-static-msys2
        path: artifacts/
        retention-days: 30

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        cd artifacts
        7z a ../convert-fgd-dem-cpp-windows-x64-static.zip *

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: convert-fgd-dem-cpp-windows-x64-static.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # MSVC/vcpkg build with static linking
  build-msvc-static:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup vcpkg binary caching
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        ./bootstrap-vcpkg.bat
        echo "$PWD" >> $env:GITHUB_PATH

    - name: Install dependencies with vcpkg (static)
      run: |
        cd vcpkg
        # Install packages with static x64-windows-static triplet
        ./vcpkg install gdal:x64-windows-static
        ./vcpkg install libzip:x64-windows-static
        ./vcpkg install tbb:x64-windows-static
        ./vcpkg integrate install

    - name: Configure CMake with vcpkg toolchain
      run: |
        cmake -B build `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static

    - name: Build
      run: cmake --build build --config Release

    - name: Verify static linking
      shell: powershell
      run: |
        Write-Host "=== Checking dependencies with dumpbin ==="
        dumpbin /dependents build/Release/convert_fgd_dem_cpp.exe
        Write-Host ""
        Write-Host "=== File info ==="
        Get-Item build/Release/convert_fgd_dem_cpp.exe | Format-Table Name, @{Name="Size (MB)"; Expression={[math]::Round($_.Length/1MB, 2)}}

    - name: Package artifacts
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path artifacts
        Copy-Item "build/Release/convert_fgd_dem_cpp.exe" "artifacts/"

        # Create README
        @'
convert_fgd_dem_cpp - Windows Static Build (MSVC)
==================================================

This is a STANDALONE static build of convert_fgd_dem_cpp for Windows.
Built with Microsoft Visual C++ (MSVC) with static linking.

NO INSTALLATION REQUIRED - MINIMAL DLLs!

This executable is statically linked and only depends on Windows system DLLs
(KERNEL32.dll, etc.) which are present on all Windows 10/11 systems.

Usage:
------
  convert_fgd_dem_cpp.exe [options] <input> <output>

For help:
  convert_fgd_dem_cpp.exe --help

Build Information:
------------------
- Compiler: Microsoft Visual C++ (MSVC) 2022
- C++20 Standard
- Optimized Release Build (/O2)
- Static runtime linking
- All dependencies statically linked (GDAL, libzip, TBB, PROJ, etc.)
- Only Windows system DLLs required

Advantages:
-----------
- Native Windows compilation (optimal performance)
- Minimal dependencies (Windows system DLLs only)
- Single executable file
- Maximum compatibility with Windows 10/11

File size: Larger than dynamic build (~50-100MB) but nearly self-contained.
'@ | Out-File -FilePath "artifacts/README.txt" -Encoding UTF8

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: convert-fgd-dem-cpp-windows-x64-static-msvc
        path: artifacts/
        retention-days: 30

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: powershell
      run: |
        Compress-Archive -Path artifacts/* -DestinationPath convert-fgd-dem-cpp-windows-x64-static-msvc.zip

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: convert-fgd-dem-cpp-windows-x64-static-msvc.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
