name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # MSYS2/MinGW build with complete static linking
  build-msys2-static:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gdal
          mingw-w64-x86_64-libzip
          mingw-w64-x86_64-tbb
          mingw-w64-x86_64-proj
          mingw-w64-x86_64-geos
          mingw-w64-x86_64-zlib
          mingw-w64-x86_64-sqlite3
          mingw-w64-x86_64-curl
          mingw-w64-x86_64-expat
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-xz
          mingw-w64-x86_64-zstd
          mingw-w64-x86_64-bzip2

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --verbose

    - name: Check dependencies
      run: |
        echo "=== Checking DLL dependencies ==="
        ldd build/convert_fgd_dem_cpp.exe
        echo ""
        echo "=== File size ==="
        ls -lh build/convert_fgd_dem_cpp.exe

    - name: Collect DLLs
      run: |
        echo "=== Collecting required DLLs ==="
        mkdir -p artifacts
        cp build/convert_fgd_dem_cpp.exe artifacts/

        # Use ldd to find all DLL dependencies and copy them
        # Filter out Windows system DLLs (only copy MinGW/MSYS2 DLLs)
        ldd build/convert_fgd_dem_cpp.exe | grep -i mingw64 | awk '{print $3}' | while read dll; do
          if [ -f "$dll" ]; then
            echo "Copying: $dll"
            cp "$dll" artifacts/
          fi
        done

        echo ""
        echo "=== Collected files ==="
        ls -lh artifacts/

    - name: Test executable
      run: |
        echo "=== Testing executable with DLLs ==="
        cd artifacts
        if [ -f convert_fgd_dem_cpp.exe ]; then
          ./convert_fgd_dem_cpp.exe --help || echo "Help command executed"
          echo "Executable runs successfully!"
        else
          echo "ERROR: Executable not found!"
          exit 1
        fi

    - name: Add documentation to artifacts
      run: |
        echo "=== Adding documentation ==="
        if [ -f README.md ]; then
          cp README.md artifacts/
        fi
        if [ -f LICENSE ]; then
          cp LICENSE artifacts/
        fi

        echo ""
        echo "=== Final artifacts contents ==="
        ls -lh artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: convert-fgd-dem-cpp-windows-x64-msys2
        path: artifacts/
        retention-days: 30

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        cd artifacts
        7z a ../convert-fgd-dem-cpp-windows-x64.zip *

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: convert-fgd-dem-cpp-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

