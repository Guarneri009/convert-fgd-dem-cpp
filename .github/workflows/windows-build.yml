name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # MSYS2/MinGW build with complete static linking
  build-msys2-static:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gdal
          mingw-w64-x86_64-libzip
          mingw-w64-x86_64-tbb
          mingw-w64-x86_64-proj
          mingw-w64-x86_64-geos

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build

    - name: Verify static linking
      run: |
        echo "=== Checking dependencies ==="
        ldd build/convert_fgd_dem_cpp.exe
        echo ""
        echo "=== File size ==="
        ls -lh build/convert_fgd_dem_cpp.exe


    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: convert-fgd-dem-cpp-windows-x64-static-msys2
        path: artifacts/
        retention-days: 30

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        cd artifacts
        7z a ../convert-fgd-dem-cpp-windows-x64-static.zip *

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: convert-fgd-dem-cpp-windows-x64-static.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

